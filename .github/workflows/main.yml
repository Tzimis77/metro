name: Scrape Metro Status

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py
        continue-on-error: true

      - name: Commit & push JSON
        run: |
          git config user.name "metro-bot"
          git config user.email "bot@metro-thess.app"
          git add public/metro_status.json
          git diff --staged --quiet || git commit -m "chore: update metro status $(date -u +%H:%M)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
